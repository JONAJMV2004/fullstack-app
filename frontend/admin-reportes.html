<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reportes | Admin Cielito Home</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="admin-body">

  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <svg viewBox="0 0 100 100" fill="none" width="28" height="28"><path d="M50 22 L70 38 L70 68 L30 68 L30 38 Z" stroke="#a8d5c2" stroke-width="2.5" fill="none"/><path d="M42 68 L42 52 L58 52 L58 68" stroke="#a8d5c2" stroke-width="2.5" fill="none"/><path d="M24 40 L50 22 L76 40" stroke="#a8d5c2" stroke-width="2.5" fill="none"/></svg>
      <span>Cielito <span>Admin</span></span>
    </div>
    <nav class="admin-nav">
      <a href="admin-reportes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Reportes</a>
      <a href="admin-usuarios.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Usuarios</a>
      <a href="admin-puntos.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Puntos</a>
      <a href="admin-estancias.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Estancias</a>
      <a href="admin-premios.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Premios</a>
      <a href="admin-canjes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>Canjes</a>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="#" id="admin-logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar Sesión</a>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <h1>Reportes y Estadísticas</h1>
      <div class="admin-topbar-user">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span id="admin-user-name">Admin</span>
      </div>
    </header>

    <div class="admin-content">
      <div id="alert" class="admin-alert"></div>

      <!-- Stats cards -->
      <div class="admin-stats">
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2D6A50" stroke-width="2" width="20" height="20"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          </div>
          <span class="stat-label">Usuarios registrados</span>
          <span class="stat-value" id="stat-usuarios">—</span>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2D6A50" stroke-width="2" width="20" height="20"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          </div>
          <span class="stat-label">Total estancias</span>
          <span class="stat-value" id="stat-estancias">—</span>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2D6A50" stroke-width="2" width="20" height="20"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/></svg>
          </div>
          <span class="stat-label">Canjes realizados</span>
          <span class="stat-value" id="stat-canjes">—</span>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2D6A50" stroke-width="2" width="20" height="20"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          </div>
          <span class="stat-label">Puntos emitidos</span>
          <span class="stat-value" id="stat-emitidos">—</span>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2D6A50" stroke-width="2" width="20" height="20"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </div>
          <span class="stat-label">Puntos canjeados</span>
          <span class="stat-value" id="stat-canjeados">—</span>
        </div>
      </div>

      <!-- Accesos rápidos -->
      <div class="admin-panel">
        <div class="admin-panel-header"><h2>Accesos rápidos</h2></div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:20px">
          <a href="admin-usuarios.html" style="text-decoration:none">
            <div style="background:#f7fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;text-align:center;transition:box-shadow .2s" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,.1)'" onmouseout="this.style.boxShadow=''">
              <svg viewBox="0 0 24 24" fill="none" stroke="#2D6A50" stroke-width="2" width="32" height="32" style="margin-bottom:8px"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              <p style="font-weight:600;color:#2d3748">Ver Usuarios</p>
            </div>
          </a>
          <a href="admin-premios.html" style="text-decoration:none">
            <div style="background:#f7fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;text-align:center;transition:box-shadow .2s" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,.1)'" onmouseout="this.style.boxShadow=''">
              <svg viewBox="0 0 24 24" fill="none" stroke="#2D6A50" stroke-width="2" width="32" height="32" style="margin-bottom:8px"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <p style="font-weight:600;color:#2d3748">Gestionar Premios</p>
            </div>
          </a>
          <a href="admin-canjes.html" style="text-decoration:none">
            <div style="background:#f7fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;text-align:center;transition:box-shadow .2s" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,.1)'" onmouseout="this.style.boxShadow=''">
              <svg viewBox="0 0 24 24" fill="none" stroke="#2D6A50" stroke-width="2" width="32" height="32" style="margin-bottom:8px"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>
              <p style="font-weight:600;color:#2d3748">Validar Canjes</p>
            </div>
          </a>
          <a href="admin-puntos.html" style="text-decoration:none">
            <div style="background:#f7fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;text-align:center;transition:box-shadow .2s" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,.1)'" onmouseout="this.style.boxShadow=''">
              <svg viewBox="0 0 24 24" fill="none" stroke="#2D6A50" stroke-width="2" width="32" height="32" style="margin-bottom:8px"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
              <p style="font-weight:600;color:#2d3748">Ajustar Puntos</p>
            </div>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    AdminAuth.requireAdmin();
    const alertEl = document.getElementById('alert');

    async function cargarReportes() {
      try {
        const res  = await fetch(`${API_ADMIN}/reportes`, { headers: adminHeader() });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        document.getElementById('stat-usuarios').textContent   = data.totalUsuarios;
        document.getElementById('stat-estancias').textContent  = data.totalEstancias;
        document.getElementById('stat-canjes').textContent     = data.totalCanjes;
        document.getElementById('stat-emitidos').textContent   = data.puntosEmitidos;
        document.getElementById('stat-canjeados').textContent  = data.puntosCanjeados;
      } catch (err) { showAdminAlert(alertEl, err.message, 'error'); }
    }

    cargarReportes();
  </script>
</body>
</html>
