<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Canjes | Admin Cielito Home</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="admin-body">

  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <svg viewBox="0 0 100 100" fill="none" width="28" height="28"><path d="M50 22 L70 38 L70 68 L30 68 L30 38 Z" stroke="#a8d5c2" stroke-width="2.5" fill="none"/><path d="M42 68 L42 52 L58 52 L58 68" stroke="#a8d5c2" stroke-width="2.5" fill="none"/><path d="M24 40 L50 22 L76 40" stroke="#a8d5c2" stroke-width="2.5" fill="none"/></svg>
      <span>Cielito <span>Admin</span></span>
    </div>
    <nav class="admin-nav">
      <a href="admin-reportes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Reportes</a>
      <a href="admin-usuarios.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Usuarios</a>
      <a href="admin-puntos.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Puntos</a>
      <a href="admin-estancias.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Estancias</a>
      <a href="admin-premios.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Premios</a>
      <a href="admin-canjes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>Canjes</a>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="#" id="admin-logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar Sesión</a>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <h1>Canjes</h1>
      <div class="admin-topbar-user">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span id="admin-user-name">Admin</span>
      </div>
    </header>

    <div class="admin-content">
      <div id="alert" class="admin-alert"></div>

      <!-- Validar código -->
      <div class="admin-panel" style="margin-bottom:24px">
        <div class="admin-panel-header"><h2>Validar código de canje</h2></div>
        <form class="admin-form" id="validar-form">
          <div class="admin-form-group" style="flex:2">
            <label>Código único</label>
            <input class="admin-input" type="text" id="f-codigo" placeholder="Ej: ABC123XY" required style="text-transform:uppercase"/>
          </div>
          <button type="submit" class="btn-admin success">Validar</button>
        </form>
        <div id="validar-result" style="padding:0 20px 16px;display:none">
          <div style="background:#f0fff4;border:1px solid #c6f6d5;border-radius:8px;padding:16px">
            <p style="font-weight:700;color:#22543d;margin-bottom:8px">✓ Código válido y marcado como usado</p>
            <p id="validar-info" style="font-size:.9rem;color:#2d3748"></p>
          </div>
        </div>
      </div>

      <!-- Lista canjes -->
      <div class="admin-panel">
        <div class="admin-panel-header">
          <h2>Historial de canjes</h2>
          <select class="admin-input" id="filtro-estado" style="max-width:180px">
            <option value="">Todos</option>
            <option value="pendiente">Pendiente</option>
            <option value="aprobado">Aprobado</option>
          </select>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr><th>ID</th><th>Usuario</th><th>Premio</th><th>Código</th><th>Estado</th><th>Fecha</th></tr>
            </thead>
            <tbody id="canjes-tbody">
              <tr><td colspan="6" style="text-align:center;color:#718096;padding:24px">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    AdminAuth.requireAdmin();
    const alertEl = document.getElementById('alert');
    let todosCanjes = [];

    async function cargarCanjes() {
      try {
        const res  = await fetch(`${API_ADMIN}/canjes`, { headers: adminHeader() });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        todosCanjes = data.canjes;
        renderTabla(todosCanjes);
      } catch (err) { showAdminAlert(alertEl, err.message, 'error'); }
    }

    function renderTabla(lista) {
      const tbody = document.getElementById('canjes-tbody');
      if (!lista.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#718096;padding:24px">Sin canjes.</td></tr>';
        return;
      }
      tbody.innerHTML = lista.map(c => `
        <tr>
          <td>${c.id}</td>
          <td>${c.usuarios?.nombre || c.usuario_id}<br><small style="color:#718096">${c.usuarios?.email || ''}</small></td>
          <td>${c.premios?.nombre || c.premio_id}</td>
          <td><code style="background:#edf2f7;padding:2px 8px;border-radius:4px;font-size:.85rem">${c.codigo_unico}</code></td>
          <td><span class="badge ${c.estado}">${c.estado}</span></td>
          <td>${formatDate(c.fecha_canje)}</td>
        </tr>
      `).join('');
    }

    document.getElementById('filtro-estado').addEventListener('change', (e) => {
      const v = e.target.value;
      renderTabla(v ? todosCanjes.filter(c => c.estado === v) : todosCanjes);
    });

    document.getElementById('validar-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAdminAlert(alertEl);
      document.getElementById('validar-result').style.display = 'none';
      const codigo = document.getElementById('f-codigo').value.trim().toUpperCase();
      try {
        const res  = await fetch(`${API_ADMIN}/canjes/validar`, {
          method: 'POST', headers: adminHeader(), body: JSON.stringify({ codigo }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        const c = data.canje;
        document.getElementById('validar-info').textContent =
          `Usuario: ${c.usuarios?.nombre || ''} (${c.usuarios?.email || ''}) · Premio: ${c.premios?.nombre || ''} · Fecha: ${formatDate(c.fecha_canje)}`;
        document.getElementById('validar-result').style.display = 'block';
        e.target.reset();
        cargarCanjes();
      } catch (err) { showAdminAlert(alertEl, err.message, 'error'); }
    });

    cargarCanjes();
  </script>
</body>
</html>
