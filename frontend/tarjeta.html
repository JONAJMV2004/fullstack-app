<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Tarjeta | Cielito Home</title>
  <link rel="stylesheet" href="css/cielito.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body class="app-body">

  <!-- ── Main ── -->
  <div class="app-page home-page">

    <header class="app-topbar">
      <div></div>
      <button class="menu-btn" id="menu-open-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </header>

    <!-- Logo -->
    <div class="app-logo-circle">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
        <path d="M50 22 L70 38 L70 68 L30 68 L30 38 Z" stroke="#2D6A50" stroke-width="2.5" fill="none"/>
        <path d="M42 68 L42 52 L58 52 L58 68" stroke="#2D6A50" stroke-width="2.5" fill="none"/>
        <circle cx="50" cy="34" r="5" stroke="#2D6A50" stroke-width="2.5" fill="none"/>
        <path d="M24 40 L50 22 L76 40" stroke="#2D6A50" stroke-width="2.5" fill="none"/>
      </svg>
      <span>Cielito Home</span>
    </div>

    <h1 class="app-section-title">Mi Tarjeta</h1>

    <!-- Info usuario -->
    <div class="home-user-info">
      <p>Usuario: <span id="user-nombre" class="home-user-name">—</span></p>
      <p>No. membresía: <span id="user-membresia">—</span></p>
    </div>

    <!-- Tarjeta digital -->
    <div class="tarjeta-digital">
      <p class="tarjeta-label">Tarjeta Digital</p>
      <div class="tarjeta-body">
        <div id="qr-code"></div>
        <div class="tarjeta-num-wrap">
          <p class="tarjeta-num-label">No. Tarjeta</p>
          <p id="tarjeta-numero" class="tarjeta-num">—</p>
        </div>
      </div>
      <div class="tarjeta-puntos">
        <span id="tarjeta-pts">— PUNTOS</span>
      </div>
    </div>

    <!-- Botón canjear -->
    <a href="recompensas.html" class="btn-ch-primary home-canjear-btn">Canjear Puntos</a>

  </div>

  <!-- ── Bottom nav ── -->
  <nav class="bottom-nav">
    <a href="home.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Inicio</span>
    </a>
    <a href="recompensas.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span>Recompensas</span>
    </a>
    <a href="tarjeta.html" class="bottom-nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>Tarjeta</span>
    </a>
  </nav>

  <script src="js/auth.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
