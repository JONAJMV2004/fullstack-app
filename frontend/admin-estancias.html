<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estancias | Admin Cielito Home</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="admin-body">

  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <svg viewBox="0 0 100 100" fill="none" width="28" height="28"><path d="M50 22 L70 38 L70 68 L30 68 L30 38 Z" stroke="#a8d5c2" stroke-width="2.5" fill="none"/><path d="M42 68 L42 52 L58 52 L58 68" stroke="#a8d5c2" stroke-width="2.5" fill="none"/><path d="M24 40 L50 22 L76 40" stroke="#a8d5c2" stroke-width="2.5" fill="none"/></svg>
      <span>Cielito <span>Admin</span></span>
    </div>
    <nav class="admin-nav">
      <a href="admin-reportes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Reportes</a>
      <a href="admin-usuarios.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Usuarios</a>
      <a href="admin-puntos.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Puntos</a>
      <a href="admin-estancias.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Estancias</a>
      <a href="admin-premios.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Premios</a>
      <a href="admin-canjes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>Canjes</a>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="#" id="admin-logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar Sesión</a>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <h1>Estancias</h1>
      <div class="admin-topbar-user">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span id="admin-user-name">Admin</span>
      </div>
    </header>

    <div class="admin-content">
      <div id="alert" class="admin-alert"></div>

      <div class="admin-panel">
        <div class="admin-panel-header">
          <h2>Todas las estancias</h2>
          <select class="admin-input" id="filtro-estado" style="max-width:180px">
            <option value="">Todos los estados</option>
            <option value="pendiente">Pendiente</option>
            <option value="activo">Activo</option>
            <option value="completado">Completado</option>
          </select>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr><th>ID</th><th>Usuario</th><th>Check-in</th><th>Check-out</th><th>Puntos</th><th>Estado</th><th>Acciones</th></tr>
            </thead>
            <tbody id="estancias-tbody">
              <tr><td colspan="7" style="text-align:center;color:#718096;padding:24px">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal editar estancia -->
  <div class="admin-modal-backdrop" id="edit-modal">
    <div class="admin-modal">
      <h3>Editar Estancia</h3>
      <input type="hidden" id="edit-id"/>
      <div class="admin-form-group">
        <label>Estado</label>
        <select class="admin-input" id="edit-estado">
          <option value="pendiente">Pendiente</option>
          <option value="activo">Activo</option>
          <option value="completado">Completado</option>
        </select>
      </div>
      <div class="admin-form-group" style="margin-top:12px">
        <label>Puntos ganados</label>
        <input class="admin-input" type="number" id="edit-puntos"/>
      </div>
      <div class="admin-modal-actions" style="margin-top:8px">
        <button class="btn-admin secondary" id="edit-cancel">Cancelar</button>
        <button class="btn-admin primary"   id="edit-confirm">Guardar</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    AdminAuth.requireAdmin();
    const alertEl = document.getElementById('alert');
    let todasEstancias = [];

    async function cargarEstancias() {
      try {
        const res  = await fetch(`${API_ADMIN}/estancias`, { headers: adminHeader() });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        todasEstancias = data.estancias;
        renderTabla(todasEstancias);
      } catch (err) { showAdminAlert(alertEl, err.message, 'error'); }
    }

    function renderTabla(lista) {
      const tbody = document.getElementById('estancias-tbody');
      if (!lista.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#718096;padding:24px">Sin estancias.</td></tr>';
        return;
      }
      tbody.innerHTML = lista.map(e => `
        <tr>
          <td>${e.id}</td>
          <td>${e.usuarios?.nombre || e.usuario_id}<br><small style="color:#718096">${e.usuarios?.email || ''}</small></td>
          <td>${formatDate(e.fecha_check_in)}</td>
          <td>${formatDate(e.fecha_check_out)}</td>
          <td><strong>${e.puntos_ganados ?? 0}</strong></td>
          <td><span class="badge ${e.estado}">${e.estado}</span></td>
          <td><button class="btn-admin secondary sm" onclick="abrirEdit(${e.id}, '${e.estado}', ${e.puntos_ganados ?? 0})">Editar</button></td>
        </tr>
      `).join('');
    }

    document.getElementById('filtro-estado').addEventListener('change', (e) => {
      const v = e.target.value;
      renderTabla(v ? todasEstancias.filter(es => es.estado === v) : todasEstancias);
    });

    function abrirEdit(id, estado, puntos) {
      document.getElementById('edit-id').value     = id;
      document.getElementById('edit-estado').value = estado;
      document.getElementById('edit-puntos').value = puntos;
      document.getElementById('edit-modal').classList.add('show');
    }

    document.getElementById('edit-cancel').addEventListener('click', () =>
      document.getElementById('edit-modal').classList.remove('show'));

    document.getElementById('edit-confirm').addEventListener('click', async () => {
      const id     = document.getElementById('edit-id').value;
      const estado = document.getElementById('edit-estado').value;
      const puntos = document.getElementById('edit-puntos').value;
      try {
        const res  = await fetch(`${API_ADMIN}/estancias/${id}`, {
          method: 'PATCH', headers: adminHeader(),
          body: JSON.stringify({ estado, puntos_ganados: parseInt(puntos) }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showAdminAlert(alertEl, 'Estancia actualizada.', 'success');
        document.getElementById('edit-modal').classList.remove('show');
        cargarEstancias();
      } catch (err) { showAdminAlert(alertEl, err.message, 'error'); }
    });

    cargarEstancias();
  </script>
</body>
</html>
