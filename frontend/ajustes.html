<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ajustes | Cielito Home</title>
  <link rel="stylesheet" href="css/cielito.css" />
</head>
<body class="app-body">
  <div class="app-page">
    <header class="app-topbar">
      <div></div>
      <button class="menu-btn" id="menu-open-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </header>

    <div class="app-logo-circle">
      <svg viewBox="0 0 100 100" fill="none" width="48" height="48">
        <path d="M50 22 L70 38 L70 68 L30 68 L30 38 Z" stroke="#2D6A50" stroke-width="2.5" fill="none"/>
        <path d="M42 68 L42 52 L58 52 L58 68" stroke="#2D6A50" stroke-width="2.5" fill="none"/>
        <circle cx="50" cy="34" r="5" stroke="#2D6A50" stroke-width="2.5" fill="none"/>
        <path d="M24 40 L50 22 L76 40" stroke="#2D6A50" stroke-width="2.5" fill="none"/>
      </svg>
      <span>Cielito Home</span>
    </div>

    <div class="inner-page-content">
      <h1 class="inner-page-title">Ajustes</h1>

      <div id="alert" class="ch-alert hidden" role="alert"></div>

      <div class="menu-list">
        <button class="menu-list-item" id="btn-idioma">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          Idioma
        </button>
        <button class="menu-list-item" id="btn-reportar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Reportar Error
        </button>
        <button class="menu-list-item" id="btn-tema">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          Tema
        </button>
        <button class="menu-list-item danger" id="btn-eliminar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Eliminar Cuenta
        </button>
      </div>
    </div>
  </div>

  <!-- Modal confirmar eliminar cuenta -->
  <div class="modal-overlay hidden" id="delete-modal">
    <div class="modal-card">
      <h3 class="modal-title">¿Eliminar cuenta?</h3>
      <p class="modal-desc">Esta acción es permanente y no se puede deshacer. Se eliminarán todos tus puntos y datos.</p>
      <div class="modal-actions">
        <button class="btn-modal-cancel" id="modal-cancel">Cancelar</button>
        <button class="btn-ch-primary modal-confirm-btn" id="modal-confirm" style="background:#ef4444">
          <span class="btn-text">Eliminar</span>
          <span class="ch-spinner hidden"></span>
        </button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="home.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Inicio</span>
    </a>
    <a href="recompensas.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span>Recompensas</span>
    </a>
    <a href="tarjeta.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>Tarjeta</span>
    </a>
  </nav>

  <script src="js/auth.js"></script>
  <script>Auth.requireAuth();</script>
  <script src="js/menu.js"></script>
  <script src="js/ajustes.js"></script>
</body>
</html>
