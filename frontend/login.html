<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión | Cielito Home</title>
  <link rel="stylesheet" href="css/cielito.css" />
</head>
<body class="auth-body">
  <div class="auth-page">

    <a href="index.html" class="ch-back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><polyline points="15 18 9 12 15 6"/></svg>
    </a>

    <div class="auth-logo-circle">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="60" height="60">
        <path d="M50 22 L70 38 L70 68 L30 68 L30 38 Z" stroke="#2D6A50" stroke-width="2" fill="none"/>
        <path d="M42 68 L42 52 L58 52 L58 68" stroke="#2D6A50" stroke-width="2" fill="none"/>
        <circle cx="50" cy="34" r="5" stroke="#2D6A50" stroke-width="2" fill="none"/>
        <path d="M24 40 L50 22 L76 40" stroke="#2D6A50" stroke-width="2" fill="none"/>
      </svg>
      <span class="auth-logo-brand">Cielito Home</span>
    </div>

    <h2 class="auth-title">Ingresa tus datos</h2>

    <div id="alert" class="ch-alert hidden" role="alert"></div>

    <form id="login-form" class="ch-form" novalidate>
      <div class="ch-input-group">
        <input type="email" id="login-email" placeholder="Correo electrónico" autocomplete="email" required />
      </div>
      <div class="ch-input-group ch-input-icon">
        <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password" required />
        <button type="button" class="ch-eye-btn" data-target="login-password">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>

      <button type="submit" class="btn-ch-primary" id="login-btn">
        <span class="btn-text">Iniciar Sesión</span>
        <span class="ch-spinner hidden"></span>
      </button>
    </form>

    <a href="#" class="ch-link-center">Restablecer contraseña</a>

    <div class="ch-social-divider"></div>

    <div class="ch-social-list">
      <button type="button" class="btn-ch-social" id="google-btn">
        <svg viewBox="0 0 48 48" width="22" height="22">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        INGRESA CON GOOGLE
      </button>

      <button type="button" class="btn-ch-social" id="facebook-btn">
        <svg viewBox="0 0 24 24" width="22" height="22">
          <path fill="#1877F2" d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073c0 6.03 4.388 11.027 10.125 11.927V15.563H7.078v-3.49h3.047v-2.66c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.514c-1.491 0-1.956.932-1.956 1.888v2.264h3.328l-.532 3.49h-2.796v8.437C19.612 23.1 24 18.103 24 12.073z"/>
        </svg>
        INGRESA CON FACEBOOK
      </button>

      <button type="button" class="btn-ch-social" id="apple-btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        INGRESA CON APPLE
      </button>
    </div>

    <p class="ch-terms">Al registrarte en Cielito Home, aceptas nuestros <a href="#">Términos y Política de privacidad.</a></p>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
