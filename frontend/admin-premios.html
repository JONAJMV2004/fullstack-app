<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Premios | Admin Cielito Home</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="admin-body">

  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <svg viewBox="0 0 100 100" fill="none" width="28" height="28"><path d="M50 22 L70 38 L70 68 L30 68 L30 38 Z" stroke="#a8d5c2" stroke-width="2.5" fill="none"/><path d="M42 68 L42 52 L58 52 L58 68" stroke="#a8d5c2" stroke-width="2.5" fill="none"/><path d="M24 40 L50 22 L76 40" stroke="#a8d5c2" stroke-width="2.5" fill="none"/></svg>
      <span>Cielito <span>Admin</span></span>
    </div>
    <nav class="admin-nav">
      <a href="admin-reportes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Reportes</a>
      <a href="admin-usuarios.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Usuarios</a>
      <a href="admin-puntos.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Puntos</a>
      <a href="admin-estancias.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Estancias</a>
      <a href="admin-premios.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Premios</a>
      <a href="admin-canjes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>Canjes</a>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="#" id="admin-logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar Sesión</a>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <h1>Catálogo de Premios</h1>
      <div class="admin-topbar-user">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span id="admin-user-name">Admin</span>
      </div>
    </header>

    <div class="admin-content">
      <div id="alert" class="admin-alert"></div>

      <!-- Formulario nuevo premio -->
      <div class="admin-panel" style="margin-bottom:24px">
        <div class="admin-panel-header"><h2>Agregar nuevo premio</h2></div>
        <form class="admin-form" id="premio-form">
          <div class="admin-form-group" style="flex:2">
            <label>Nombre</label>
            <input class="admin-input" type="text" id="f-nombre" placeholder="Ej: Noche gratis" required/>
          </div>
          <div class="admin-form-group">
            <label>Puntos necesarios</label>
            <input class="admin-input" type="number" id="f-puntos" placeholder="100" min="1" required/>
          </div>
          <div class="admin-form-group">
            <label>Disponibilidad</label>
            <input class="admin-input" type="number" id="f-disp" placeholder="10" min="0" required/>
          </div>
          <button type="submit" class="btn-admin primary">Agregar</button>
        </form>
      </div>

      <!-- Tabla premios -->
      <div class="admin-panel">
        <div class="admin-panel-header"><h2>Premios existentes</h2></div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr><th>ID</th><th>Nombre</th><th>Puntos</th><th>Disponibilidad</th><th>Acciones</th></tr>
            </thead>
            <tbody id="premios-tbody">
              <tr><td colspan="6" style="text-align:center;color:#718096;padding:24px">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal editar -->
  <div class="admin-modal-backdrop" id="edit-modal">
    <div class="admin-modal">
      <h3>Editar Premio</h3>
      <input type="hidden" id="edit-id"/>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="admin-form-group"><label>Nombre</label><input class="admin-input" type="text" id="edit-nombre"/></div>
        <div class="admin-form-group"><label>Puntos necesarios</label><input class="admin-input" type="number" id="edit-puntos"/></div>
        <div class="admin-form-group"><label>Disponibilidad</label><input class="admin-input" type="number" id="edit-disp"/></div>
      </div>
      <div class="admin-modal-actions">
        <button class="btn-admin secondary" id="edit-cancel">Cancelar</button>
        <button class="btn-admin primary"   id="edit-confirm">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal confirmar eliminar -->
  <div class="admin-modal-backdrop" id="delete-modal">
    <div class="admin-modal">
      <h3>Eliminar premio</h3>
      <p id="delete-text">¿Estás seguro?</p>
      <div class="admin-modal-actions">
        <button class="btn-admin secondary" id="delete-cancel">Cancelar</button>
        <button class="btn-admin danger"    id="delete-confirm">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    AdminAuth.requireAdmin();
    const alertEl = document.getElementById('alert');
    let deleteId = null;

    async function cargarPremios() {
      try {
        const res  = await fetch(`${API_ADMIN}/premios`, { headers: adminHeader() });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        const tbody = document.getElementById('premios-tbody');
        if (!data.premios.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#718096;padding:24px">Sin premios.</td></tr>';
          return;
        }
        tbody.innerHTML = data.premios.map(p => `
          <tr>
            <td>${p.id}</td>
            <td><strong>${p.nombre}</strong></td>
            <td>${p.puntos_necesarios} pts</td>
            <td><span class="badge ${p.disponibilidad > 0 ? 'activo' : 'inactivo'}">${p.disponibilidad}</span></td>
            <td style="display:flex;gap:6px">
              <button class="btn-admin secondary sm" onclick="abrirEdit(${p.id},'${p.nombre.replace(/'/g,"\\'")}',${p.puntos_necesarios},${p.disponibilidad})">Editar</button>
              <button class="btn-admin danger sm"    onclick="abrirDelete(${p.id},'${p.nombre.replace(/'/g,"\\'")}')">Eliminar</button>
            </td>
          </tr>
        `).join('');
      } catch (err) { showAdminAlert(alertEl, err.message, 'error'); }
    }

    document.getElementById('premio-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAdminAlert(alertEl);
      const body = {
        nombre: document.getElementById('f-nombre').value.trim(),
        puntos_necesarios: parseInt(document.getElementById('f-puntos').value),
        disponibilidad: parseInt(document.getElementById('f-disp').value),
      };
      try {
        const res  = await fetch(`${API_ADMIN}/premios`, { method: 'POST', headers: adminHeader(), body: JSON.stringify(body) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showAdminAlert(alertEl, 'Premio creado.', 'success');
        e.target.reset();
        cargarPremios();
      } catch (err) { showAdminAlert(alertEl, err.message, 'error'); }
    });

    function abrirEdit(id, nombre, puntos, disp) {
      document.getElementById('edit-id').value     = id;
      document.getElementById('edit-nombre').value = nombre;
      document.getElementById('edit-puntos').value = puntos;
      document.getElementById('edit-disp').value   = disp;
      document.getElementById('edit-modal').classList.add('show');
    }

    document.getElementById('edit-cancel').addEventListener('click', () =>
      document.getElementById('edit-modal').classList.remove('show'));

    document.getElementById('edit-confirm').addEventListener('click', async () => {
      const id = document.getElementById('edit-id').value;
      const body = {
        nombre: document.getElementById('edit-nombre').value.trim(),
        puntos_necesarios: parseInt(document.getElementById('edit-puntos').value),
        disponibilidad: parseInt(document.getElementById('edit-disp').value),
      };
      try {
        const res  = await fetch(`${API_ADMIN}/premios/${id}`, { method: 'PATCH', headers: adminHeader(), body: JSON.stringify(body) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showAdminAlert(alertEl, 'Premio actualizado.', 'success');
        document.getElementById('edit-modal').classList.remove('show');
        cargarPremios();
      } catch (err) { showAdminAlert(alertEl, err.message, 'error'); }
    });

    function abrirDelete(id, nombre) {
      deleteId = id;
      document.getElementById('delete-text').textContent = `¿Eliminar "${nombre}"?`;
      document.getElementById('delete-modal').classList.add('show');
    }

    document.getElementById('delete-cancel').addEventListener('click', () =>
      document.getElementById('delete-modal').classList.remove('show'));

    document.getElementById('delete-confirm').addEventListener('click', async () => {
      try {
        const res  = await fetch(`${API_ADMIN}/premios/${deleteId}`, { method: 'DELETE', headers: adminHeader() });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showAdminAlert(alertEl, 'Premio eliminado.', 'success');
        document.getElementById('delete-modal').classList.remove('show');
        cargarPremios();
      } catch (err) { showAdminAlert(alertEl, err.message, 'error'); }
    });

    cargarPremios();
  </script>
</body>
</html>
