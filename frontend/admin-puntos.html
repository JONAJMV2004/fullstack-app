<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Puntos | Admin Cielito Home</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="admin-body">

  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <svg viewBox="0 0 100 100" fill="none" width="28" height="28"><path d="M50 22 L70 38 L70 68 L30 68 L30 38 Z" stroke="#a8d5c2" stroke-width="2.5" fill="none"/><path d="M42 68 L42 52 L58 52 L58 68" stroke="#a8d5c2" stroke-width="2.5" fill="none"/><path d="M24 40 L50 22 L76 40" stroke="#a8d5c2" stroke-width="2.5" fill="none"/></svg>
      <span>Cielito <span>Admin</span></span>
    </div>
    <nav class="admin-nav">
      <a href="admin-reportes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Reportes</a>
      <a href="admin-usuarios.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Usuarios</a>
      <a href="admin-puntos.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Puntos</a>
      <a href="admin-estancias.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Estancias</a>
      <a href="admin-premios.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Premios</a>
      <a href="admin-canjes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>Canjes</a>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="#" id="admin-logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar Sesión</a>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <h1>Gestión de Puntos</h1>
      <div class="admin-topbar-user">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span id="admin-user-name">Admin</span>
      </div>
    </header>

    <div class="admin-content">
      <div id="alert" class="admin-alert"></div>

      <!-- Buscador de usuario -->
      <div class="admin-panel" style="margin-bottom:24px">
        <div class="admin-panel-header"><h2>Buscar usuario</h2></div>
        <div style="padding:16px 20px;display:flex;gap:10px;align-items:center">
          <input class="admin-input" type="text" id="search-usuario" placeholder="Nombre o email del usuario…" style="max-width:340px"/>
          <button class="btn-admin primary" id="btn-buscar">Buscar</button>
        </div>

        <!-- Resultados de búsqueda -->
        <div id="search-results" style="display:none;padding:0 20px 16px">
          <div id="search-list" style="display:flex;flex-direction:column;gap:8px"></div>
        </div>

        <!-- Usuario seleccionado -->
        <div id="usuario-seleccionado" style="display:none;margin:0 20px 16px;background:#e8f5f0;border:1px solid #2D6A50;border-radius:10px;padding:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
            <div>
              <p style="font-weight:700;color:#1a4a38;font-size:1rem" id="sel-nombre">—</p>
              <p style="color:#4a5568;font-size:.88rem" id="sel-email">—</p>
            </div>
            <div style="text-align:right">
              <p style="font-size:.78rem;color:#718096">Balance actual</p>
              <p style="font-weight:700;font-size:1.4rem;color:#2D6A50" id="sel-balance">— pts</p>
            </div>
            <button class="btn-admin secondary sm" id="btn-cambiar">Cambiar usuario</button>
          </div>
        </div>
      </div>

      <!-- Formulario agregar/quitar puntos -->
      <div class="admin-panel" id="panel-form" style="margin-bottom:24px;display:none">
        <div class="admin-panel-header"><h2>Ajustar puntos</h2></div>
        <form class="admin-form" id="puntos-form">
          <input type="hidden" id="f-usuario"/>
          <div class="admin-form-group">
            <label>Puntos a agregar (negativo para quitar)</label>
            <input class="admin-input" type="number" id="f-puntos" placeholder="Ej: 50 o -20" required/>
          </div>
          <div class="admin-form-group" style="flex:2">
            <label>Descripción</label>
            <input class="admin-input" type="text" id="f-desc" placeholder="Ej: Bonificación por estancia" required/>
          </div>
          <button type="submit" class="btn-admin primary">Aplicar puntos</button>
        </form>
      </div>

      <!-- Historial -->
      <div class="admin-panel">
        <div class="admin-panel-header"><h2>Historial de movimientos (últimos 100)</h2></div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr><th>ID</th><th>Usuario</th><th>Email</th><th>Puntos</th><th>Descripción</th><th>Fecha</th></tr>
            </thead>
            <tbody id="puntos-tbody">
              <tr><td colspan="6" style="text-align:center;color:#718096;padding:24px">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    AdminAuth.requireAdmin();
    const alertEl = document.getElementById('alert');
    let usuarioActual = null;

    // ── Búsqueda de usuario ──
    async function buscarUsuario() {
      const q = document.getElementById('search-usuario').value.trim();
      if (!q) return;
      hideAdminAlert(alertEl);
      try {
        const res  = await fetch(`${API_ADMIN}/usuarios`, { headers: adminHeader() });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        const resultados = data.usuarios.filter(u =>
          u.nombre?.toLowerCase().includes(q.toLowerCase()) ||
          u.email.toLowerCase().includes(q.toLowerCase())
        );

        const list = document.getElementById('search-list');
        const box  = document.getElementById('search-results');

        if (!resultados.length) {
          list.innerHTML = '<p style="color:#718096;font-size:.9rem">No se encontraron usuarios.</p>';
        } else {
          list.innerHTML = resultados.map(u => `
            <div onclick="seleccionarUsuario(${u.id},'${(u.nombre||'').replace(/'/g,"\\'")}','${u.email}')"
              style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:background .15s"
              onmouseover="this.style.background='#f0fff4'" onmouseout="this.style.background='#fff'">
              <div>
                <p style="font-weight:600;color:#2d3748">${u.nombre || '(sin nombre)'}</p>
                <p style="font-size:.82rem;color:#718096">${u.email}</p>
              </div>
              <span class="badge ${u.tipo_usuario}">${u.tipo_usuario}</span>
            </div>
          `).join('');
        }
        box.style.display = 'block';
      } catch (err) { showAdminAlert(alertEl, err.message, 'error'); }
    }

    document.getElementById('btn-buscar').addEventListener('click', buscarUsuario);
    document.getElementById('search-usuario').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); buscarUsuario(); }
    });

    async function seleccionarUsuario(id, nombre, email) {
      // Obtener balance actual
      try {
        const res  = await fetch(`${API_ADMIN}/puntos`, { headers: adminHeader() });
        const data = await res.json();
        const movs = (data.puntos || []).filter(p => p.usuario_id === id);
        const balance = movs.reduce((sum, p) => sum + p.puntos, 0);

        usuarioActual = { id, nombre, email, balance };

        document.getElementById('sel-nombre').textContent  = nombre || '(sin nombre)';
        document.getElementById('sel-email').textContent   = email;
        document.getElementById('sel-balance').textContent = `${balance} pts`;
        document.getElementById('f-usuario').value         = id;

        document.getElementById('search-results').style.display     = 'none';
        document.getElementById('usuario-seleccionado').style.display = 'block';
        document.getElementById('panel-form').style.display           = 'block';
        document.getElementById('search-usuario').value = '';
      } catch (err) { showAdminAlert(alertEl, err.message, 'error'); }
    }

    document.getElementById('btn-cambiar').addEventListener('click', () => {
      usuarioActual = null;
      document.getElementById('usuario-seleccionado').style.display = 'none';
      document.getElementById('panel-form').style.display           = 'none';
      document.getElementById('search-results').style.display       = 'none';
    });

    // ── Aplicar puntos ──
    document.getElementById('puntos-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAdminAlert(alertEl);
      const puntos = parseInt(document.getElementById('f-puntos').value);
      const body = {
        usuario_id:  parseInt(document.getElementById('f-usuario').value),
        puntos,
        descripcion: document.getElementById('f-desc').value.trim(),
      };
      try {
        const res  = await fetch(`${API_ADMIN}/puntos`, { method: 'POST', headers: adminHeader(), body: JSON.stringify(body) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        const nuevoBalance = (usuarioActual?.balance || 0) + puntos;
        showAdminAlert(alertEl, `✓ ${puntos > 0 ? '+' : ''}${puntos} puntos aplicados. Nuevo balance: ${nuevoBalance} pts`, 'success');
        document.getElementById('sel-balance').textContent = `${nuevoBalance} pts`;
        if (usuarioActual) usuarioActual.balance = nuevoBalance;
        document.getElementById('f-puntos').value = '';
        document.getElementById('f-desc').value   = '';
        cargarPuntos();
      } catch (err) { showAdminAlert(alertEl, err.message, 'error'); }
    });

    // ── Historial ──
    async function cargarPuntos() {
      try {
        const res  = await fetch(`${API_ADMIN}/puntos`, { headers: adminHeader() });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        const tbody = document.getElementById('puntos-tbody');
        if (!data.puntos.length) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#718096;padding:24px">Sin movimientos.</td></tr>';
          return;
        }
        tbody.innerHTML = data.puntos.map(p => `
          <tr>
            <td>${p.id}</td>
            <td>${p.usuarios?.nombre || p.usuario_id}</td>
            <td>${p.usuarios?.email || '—'}</td>
            <td style="color:${p.puntos >= 0 ? '#38a169' : '#e53e3e'};font-weight:600">${p.puntos >= 0 ? '+' : ''}${p.puntos}</td>
            <td>${p.descripcion}</td>
            <td>${formatDate(p.fecha)}</td>
          </tr>
        `).join('');
      } catch (err) { showAdminAlert(alertEl, err.message, 'error'); }
    }

    cargarPuntos();
  </script>
</body>
</html>
