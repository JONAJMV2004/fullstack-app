  <meta charset="UTF-8"/>

  <link rel="stylesheet" href="css/admin.css"/>
</head>

  <!-- Sidebar -->

        <path d="M42 68 L42 52 L58 52 L58 68" stroke="#a8d5c2" stroke-width="2.5" fill="none"/>
        <path d="M24 40 L50 22 L76 40" stroke="#a8d5c2" stroke-width="2.5" fill="none"/>
      </svg>
      <span>Cielito <span>Admin</span></span>
    </div>
    <nav class="admin-nav">
      <a href="admin-reportes.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Reportes
      </a>
      <a href="admin-usuarios.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Usuarios
      </a>
      <a href="admin-puntos.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        Puntos
      </a>
      <a href="admin-estancias.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Estancias
      </a>
      <a href="admin-premios.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Premios
      </a>
      <a href="admin-canjes.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
        Canjes
      </a>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="#" id="admin-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar Sesión
      </a>
    </div>
  </aside>

  <!-- Main -->
  <div class="admin-main">
    <header class="admin-topbar">
      <h1>Usuarios</h1>
      <div class="admin-topbar-user">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span id="admin-user-name">Admin</span>
      </div>
    </header>

    <div class="admin-content">
      <div id="alert" class="admin-alert"></div>

      <div class="admin-panel">
        <div class="admin-panel-header">
          <h2>Lista de usuarios registrados</h2>
          <input class="admin-input" style="max-width:220px" type="text" id="search-input" placeholder="Buscar por nombre o email…"/>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Tipo</th>
                <th>Proveedor</th>
                <th>Registro</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="usuarios-tbody">
              <tr><td colspan="7" style="text-align:center;color:#718096;padding:24px">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal confirmar eliminar -->
  <div class="admin-modal-backdrop" id="delete-modal">
    <div class="admin-modal">
      <h3>Eliminar usuario</h3>
      <p id="delete-modal-text">¿Estás seguro? Esta acción no se puede deshacer.</p>
      <div class="admin-modal-actions">
        <button class="btn-admin secondary" id="delete-cancel">Cancelar</button>
        <button class="btn-admin danger"    id="delete-confirm">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    AdminAuth.requireAdmin();

    let todosUsuarios = [];
    let deleteId = null;
    const alertEl = document.getElementById('alert');

    async function cargarUsuarios() {
      try {
        const res  = await fetch(`${API_ADMIN}/usuarios`, { headers: adminHeader() });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        todosUsuarios = data.usuarios;
        renderTabla(todosUsuarios);
      } catch (err) {
        showAdminAlert(alertEl, err.message, 'error');
      }
    }

    function renderTabla(lista) {
      const tbody = document.getElementById('usuarios-tbody');
      if (!lista.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#718096;padding:24px">Sin usuarios.</td></tr>';
        return;
      }
      tbody.innerHTML = lista.map(u => `
        <tr>
          <td>${u.id}</td>
          <td>${u.nombre || '—'}</td>
          <td>${u.email}</td>
          <td><span class="badge ${u.tipo_usuario}">${u.tipo_usuario}</span></td>
          <td>${u.provider || 'local'}</td>
          <td>${formatDate(u.fecha_registro)}</td>
          <td>
            <button class="btn-admin danger sm" onclick="abrirDelete(${u.id}, '${u.email}')">Eliminar</button>
          </td>
        </tr>
      `).join('');
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      renderTabla(todosUsuarios.filter(u =>
        (u.nombre || '').toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
      ));
    });

    function abrirDelete(id, email) {
      deleteId = id;
      document.getElementById('delete-modal-text').textContent = `¿Eliminar a "${email}"? Esta acción no se puede deshacer.`;
      document.getElementById('delete-modal').classList.add('show');
    }

    document.getElementById('delete-cancel').addEventListener('click', () => {
      deleteId = null;
      document.getElementById('delete-modal').classList.remove('show');
    });

    document.getElementById('delete-confirm').addEventListener('click', async () => {
      if (!deleteId) return;
      try {
        const res = await fetch(`${API_ADMIN}/usuarios/${deleteId}`, { method: 'DELETE', headers: adminHeader() });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showAdminAlert(alertEl, 'Usuario eliminado.', 'success');
        document.getElementById('delete-modal').classList.remove('show');
        cargarUsuarios();
      } catch (err) {
        showAdminAlert(alertEl, err.message, 'error');
      }
    });

    cargarUsuarios();
  </script>
</body>
</html>
