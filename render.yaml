services:
  - type: web
    name: fullstack-app-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OAUTH_REDIRECT_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: fullstack-app-frontend
    runtime: static
    rootDir: frontend-react
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    previews:
      generation: automatic
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
